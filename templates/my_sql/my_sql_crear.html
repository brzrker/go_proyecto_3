{{ template "header" }}

    <main class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/">Home</a></li>
                <li class="breadcrumb-item"><a href="/my-sql">Pagina Principal MySQL</a></li>
                <li class="breadcrumb-item active" aria-current="page">Crear cliente</li>
            </ol>
        </nav>

        <h1>Crear Cliente</h1>

        {{ if ne .css "" }}
        <div class="alert alert-{{ .css }} alert-dismissible fade show" role="alert">
            {{ .mensaje }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {{ end }}

        <form action="/my-sql/my-sql-crear-post" method="post">
            <div class="form-group">
                <label for="Nombre">Nombre:</label>
                <input name="nombre" type="text" id="nombre" class="form-control" placeholder="Nombre"/>
            </div>
            <div class="form-group">
                <label for="Correo">Correo:</label>
                <input name="correo" type="text" id="correo" class="form-control" placeholder="Correo"/>
            </div>
            <div class="form-group">
                <label for="Telefono">Telefono:</label>
                <input name="telefono" type="text" id="telefono" class="form-control" placeholder="Telefono"/>
            </div>
            <br>
            <input type="submit" value="Enviar" class="btn btn-primary"/>
            <br>
            <br>
        </form>
    </main>

{{ template "footer" }}
