{{ template "header" }}

    <main class="container">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/">Home</a></li>
                <li class="breadcrumb-item"><a href="/my-sql">Pagina Principal MySQL</a></li>
                <li class="breadcrumb-item active" aria-current="page">Editar cliente</li>
            </ol>
        </nav>

        <h1>Editar Cliente asdasd</h1>

        {{ if ne .Css  ""}}
            <div class="alert alert-{{.Css}} alert-dismissible fade show" role="alert">
                {{.Mensaje}}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {{end}}

        <form action="/my-sql/my-sql-editar-post/{{.Datos.Id}}" method="POST">
            <div class="form-group">
                <label for="nombre">Nombre:</label>
                <input 
                    type="text" name="nombre" id="nombre" class="form-control" placeholder="Nombre" value="{{ .Datos.Nombre }}"
                />
                <label for="correo">Correo:</label>
                <input 
                    type="text" name="correo" id="correo" class="form-control" placeholder="Correo" value="{{ .Datos.Correo }}"
                />
                <label for="telefono">Telefono:</label>
                <input 
                    type="text" name="telefono" id="telefono" class="form-control" placeholder="Telefono" value="{{ .Datos.Telefono }}"
                />
            </div>

            <br>
            <input type="submit" class="btn btn-primary" value="Enviar"/>
            <br>
            <br>
        </form>        
    </main>

{{ template "footer" }}
